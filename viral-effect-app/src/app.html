<!doctype html>
<html lang="ja" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#18181b" />
    <meta name="description" content="SNSでバズった画像エフェクトをあなたの写真にブラウザ完結で適用・シェア" />
    <!-- OGP -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:site_name" content="バズエフェクト" />
    <meta property="og:title" content="バズエフェクト — SNSで話題の加工をブラウザで" />
    <meta property="og:description" content="SNSでバズった画像エフェクトをあなたの写真にブラウザ完結で適用・シェア" />
    <meta property="og:image" content="%sveltekit.assets%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="バズエフェクト — SNSで話題の加工をブラウザで" />
    <meta name="twitter:description" content="SNSでバズった画像エフェクトをあなたの写真にブラウザ完結で適用・シェア" />
    <meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

    <meta
      http-equiv="Content-Security-Policy"
      content="worker-src 'self' blob:; connect-src 'self' blob: https://huggingface.co https://*.huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co; img-src 'self' blob: data:;"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
